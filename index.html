<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO MAX v3.2</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:16px;
  margin:12px 0;
  border-radius:16px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:bold;
}

.item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO MAX v3.2</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- WEATHER (FIXED - NEVER HANGS) -->
<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading weather...</div>
</div>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min before</option>
  <option value="10">10 min before</option>
  <option value="15" selected>15 min before</option>
  <option value="30">30 min before</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add todo</button>

<div id="todos"></div>
</div>

</div>

<script>

/* =========================
   STORAGE
========================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* =========================
   NOTIFICATIONS
========================= */
async function enableNotifications(){
  const p = await Notification.requestPermission();
  alert("Permission: " + p);
}

/* =========================
   WEATHER FIX (NO HANG)
========================= */
function initWeather(){
  const el = document.getElementById("weather");

  const fallback = { lat: 48.2082, lon: 16.3738 };

  el.innerText = "🌦 Loading weather...";

  const load = (lat, lon) => {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
      .then(r => r.json())
      .then(d => {
        if(!d.current_weather){
          el.innerText = "Weather unavailable";
          return;
        }

        el.innerText = "🌡 " + d.current_weather.temperature + "°C";
      })
      .catch(() => {
        el.innerText = "Weather error";
      });
  };

  if(!navigator.geolocation){
    load(fallback.lat, fallback.lon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    p => load(p.coords.latitude, p.coords.longitude),
    () => load(fallback.lat, fallback.lon),
    { timeout: 3000 }
  );
}

/* =========================
   EVENTS
========================= */
function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  if(!name || !date || !time) return;

  events.push({
    id:Date.now(),
    name,
    time:new Date(`${date}T${time}`).getTime(),
    alarm,
    notified:false
  });

  save();
  render();
}

/* DELETE */
function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* =========================
   TODO
========================= */
function addTodo(){
  const v = document.getElementById("todoInput").value;
  if(!v) return;

  todos.push({text:v,done:false});
  document.getElementById("todoInput").value="";
  saveTodos();
  render();
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  saveTodos();
  render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  render();
}

/* =========================
   NOTIFICATION LOOP
========================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      if(Notification.permission === "granted"){
        new Notification("⏰ Event",{
          body: ev.name
        });
      }
      ev.notified = true;
      save();
    }
  });

  // auto remove past events
  events = events.filter(e => e.time > now - 60000);
  save();

  render();

},3000);

/* =========================
   RENDER (STABLE)
========================= */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}<br>
        ⏰ alarm: ${ev.alarm} min<br><br>
        <button onclick="delEvent(${ev.id})">Delete</button>
      </div>
    `;
  });

  const t = document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="item">
        <input type="checkbox" ${x.done?"checked":""}
        onchange="toggleTodo(${i})">
        <span style="text-decoration:${x.done?'line-through':'none'}">
          ${x.text}
        </span>
        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}
function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* INIT */
render();
initWeather();

</script>

</body>
</html>
