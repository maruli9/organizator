<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO FIXED</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:600;
}

/* EVENT ROW = 1 LINE */
.event-row{
  display:grid;
  grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 0.6fr;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  font-size:13px;
}

/* TODO ROW */
.todo-row{
  display:grid;
  grid-template-columns: 40px 1fr 50px;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* WEATHER */
#weather{
  font-size:18px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO FIXED</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- WEATHER (SAFE MODULE) -->
<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading weather...</div>
</div>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
  <option value="30">30 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<script>

/* =========================
   STORAGE
========================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* =========================
   NOTIFICATIONS
========================= */
async function enableNotifications(){
  const p = await Notification.requestPermission();
  alert("Permission: " + p);
}

/* =========================
   WEATHER (100% SAFE)
========================= */
function initWeather(){
  const el = document.getElementById("weather");

  const fallback = { lat: 48.2082, lon: 16.3738 };

  let finished = false;

  const failSafe = setTimeout(()=>{
    if(!finished){
      el.innerText = "🌦 Weather fallback (no response)";
      finished = true;
    }
  }, 4000);

  const load = (lat, lon)=>{
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
      .then(r=>r.json())
      .then(d=>{
        if(finished) return;

        clearTimeout(failSafe);

        if(d && d.current_weather){
          el.innerText = "🌡 " + d.current_weather.temperature + "°C";
        } else {
          el.innerText = "Weather unavailable";
        }

        finished = true;
      })
      .catch(()=>{
        if(finished) return;

        clearTimeout(failSafe);
        el.innerText = "Weather error";
        finished = true;
      });
  };

  if(!navigator.geolocation){
    load(fallback.lat, fallback.lon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    p=>load(p.coords.latitude, p.coords.longitude),
    ()=>load(fallback.lat, fallback.lon),
    { timeout: 3000 }
  );
}

/* =========================
   EVENTS
========================= */
let editId = null;

function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  if(!name || !date || !time) return;

  const t = new Date(`${date}T${time}`).getTime();

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name = name;
    ev.time = t;
    ev.alarm = alarm;
    ev.notified = false;
    editId = null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

function editEvent(id){
  const ev = events.find(e=>e.id===id);

  document.getElementById("name").value = ev.name;
  document.getElementById("date").value = new Date(ev.time).toISOString().split("T")[0];
  document.getElementById("time").value = new Date(ev.time).toTimeString().slice(0,5);
  document.getElementById("alarm").value = ev.alarm;

  editId = id;
}

/* =========================
   TODO
========================= */
function addTodo(){
  const v = document.getElementById("todoInput").value;
  if(!v) return;

  todos.push({text:v,done:false});
  document.getElementById("todoInput").value="";
  saveTodos();
  render();
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  saveTodos();
  render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  render();
}

/* =========================
   LOOP (ALERTS)
========================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      if(Notification.permission==="granted"){
        new Notification("⏰ Event", { body: ev.name });
      }
      ev.notified = true;
      save();
    }
  });

  events = events.filter(e=>e.time > now - 60000);
  save();

  render();

},3000);

/* =========================
   RENDER
========================= */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="event-row">
        <div>${ev.name}</div>
        <div>${new Date(ev.time).toLocaleDateString()}</div>
        <div>${new Date(ev.time).toTimeString().slice(0,5)}</div>
        <button onclick="editEvent(${ev.id})">Edit</button>
        <button onclick="delEvent(${ev.id})">X</button>
      </div>
    `;
  });

  const t = document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="todo-row">
        <input type="checkbox" ${x.done?"checked":""}
        onchange="toggleTodo(${i})">

        <div style="text-decoration:${x.done?'line-through':'none'}">
          ${x.text}
        </div>

        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });

}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}
function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* INIT */
render();
initWeather();

</script>

</body>
</html>
