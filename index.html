<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO MAX v2</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:16px;
  margin:12px 0;
  border-radius:16px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:bold;
}

.item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO MAX v2</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="eventName" placeholder="Event name">
<input id="eventDate" type="date">
<input id="eventTime" type="time">
<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Tasks</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add task</button>

<div id="todos"></div>
</div>

<!-- WEATHER -->
<div class="card">
<h2>🌦 Weather</h2>
<p id="weather">Loading...</p>
</div>

</div>

<script>

/* =========================
   STORAGE
========================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* =========================
   NOTIFICATIONS (REAL FIX)
========================= */
async function enableNotifications(){
  if(!("Notification" in window)){
    alert("Brak wsparcia notifications");
    return;
  }

  const perm = await Notification.requestPermission();

  alert("Permission: " + perm);

  if(perm === "granted"){
    new Notification("Event Hub PRO MAX",{
      body:"Notifications enabled"
    });
  }
}

function notify(title, body){
  if(Notification.permission === "granted"){
    new Notification(title,{body});
  }
}

/* =========================
   EVENTS
========================= */
function addEvent(){
  const name = document.getElementById("eventName").value;
  const date = document.getElementById("eventDate").value;
  const time = document.getElementById("eventTime").value;

  if(!name || !date || !time) return;

  events.push({
    id:Date.now(),
    name,
    time:new Date(`${date}T${time}`).getTime(),
    notified:false
  });

  saveEvents();
  render();
}

function saveEvents(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* =========================
   LOOP (FIXED RELIABLE)
========================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    // 15 min alert (STABLE)
    if(!ev.notified && diff <= 15*60*1000 && diff > 0){
      notify("⏰ 15 min alert", ev.name);
      ev.notified = true;
      saveEvents();
    }
  });

},3000);

/* =========================
   RENDER EVENTS + TODOS
========================= */
function render(){
  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}
      </div>
    `;
  });

  const t = document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="item">
        <input type="checkbox" ${x.done?"checked":""}
        onchange="toggleTodo(${i})">
        ${x.text}
        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });
}

/* =========================
   TODO FIXED
========================= */
function addTodo(){
  const v = document.getElementById("todoInput").value;
  if(!v) return;

  todos.push({text:v,done:false});
  document.getElementById("todoInput").value="";
  saveTodos();
  render();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  saveTodos();
  render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  render();
}

function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* =========================
   WEATHER (FIXED + FAST)
========================= */
function loadWeather(lat,lon){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("weather").innerText =
      "🌡 " + d.current_weather.temperature + "°C";
  })
  .catch(()=>{
    document.getElementById("weather").innerText="Weather error";
  });
}

function initWeather(){
  const fallback = {lat:48.2082,lon:16.3738};

  if(!navigator.geolocation){
    loadWeather(fallback.lat,fallback.lon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    p=>loadWeather(p.coords.latitude,p.coords.longitude),
    ()=>loadWeather(fallback.lat,fallback.lon),
    {timeout:3000}
  );
}

/* =========================
   INIT
========================= */
window.onload=()=>{
  render();
  initWeather();
};

</script>

</body>
</html>
