<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub SaaS</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0b0f1a,#1a1f3a);
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

/* HEADER */
h1{
  font-size:22px;
  opacity:0.9;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  padding:16px;
  margin:14px 0;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  transition:.25s;
}

.card:hover{
  transform:translateY(-2px);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#6c5ce7;
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#7d6cff;
}

/* EVENT CARD */
.event-card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.event-info{
  font-size:13px;
}

.event-actions{
  display:flex;
  gap:8px;
}

.icon-btn{
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
}

.icon-btn:hover{
  background:rgba(255,255,255,0.2);
}

/* NEXT */
.next-event{
  background:linear-gradient(135deg,#6c5ce7,#4834d4);
  padding:12px;
  border-radius:12px;
  margin-top:8px;
}

/* TODO */
.todo-row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:10px;
}

#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:red;
  text-align:center;
  padding-top:35%;
  font-size:28px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 EventHub</h1>

<div id="nextEvents"></div>

<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading...</div>
</div>

<div class="card">
<h2>📅 Add / Edit Event</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
<option value="5">5 min</option>
<option value="10">10 min</option>
<option value="15">15 min</option>
</select>

<button onclick="addEvent()">Save event</button>

<div id="eventList"></div>
</div>

<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<div id="alarmBox">
⏰ EVENT ALARM
<div id="alarmText"></div>
<button onclick="stopAlarm()">STOP</button>
</div>

<script>

let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");
let editId = null;

/* WEATHER */
function weather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=48.17&longitude=16.48&current_weather=true")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("weather").innerText =
    "Vienna: " + d.current_weather.temperature + "°C";
  });
}

/* ADD / EDIT */
function addEvent(){
  const name = nameInput.value;
  const date = dateInput.value;
  const time = timeInput.value;
  const alarm = parseInt(alarmSelect.value);

  const t = new Date(`${date}T${time}`).getTime();
  if(!name || !t) return;

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name=name;
    ev.time=t;
    ev.alarm=alarm;
    editId=null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* EDIT */
function editEvent(id){
  const ev = events.find(e=>e.id===id);
  editId=id;

  nameInput.value=ev.name;
  dateInput.value=new Date(ev.time).toISOString().slice(0,10);
  timeInput.value=new Date(ev.time).toTimeString().slice(0,5);
  alarmSelect.value=ev.alarm;
}

/* DELETE */
function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* RENDER */
function render(){

  events.sort((a,b)=>a.time-b.time);

  const list = document.getElementById("eventList");
  list.innerHTML="";

  events.forEach(ev=>{
    list.innerHTML += `
      <div class="event-card">
        <div class="event-info">
          <b>${ev.name}</b><br>
          ${new Date(ev.time).toLocaleString()}
        </div>

        <div class="event-actions">
          <div class="icon-btn" onclick="editEvent(${ev.id})">✏️</div>
          <div class="icon-btn" onclick="delEvent(${ev.id})">🗑️</div>
        </div>
      </div>
    `;
  });

  const next = document.getElementById("nextEvents");
  next.innerHTML="";

  events.slice(0,3).forEach(ev=>{
    next.innerHTML += `
      <div class="next-event">
        ${ev.name}<br>
        ${new Date(ev.time).toLocaleString()}
      </div>
    `;
  });

  renderTodos();
}

/* TODO */
function addTodo(){
  const val = todoInput.value;
  if(!val) return;
  todos.push({text:val,done:false});
  saveTodos();
  renderTodos();
}

function renderTodos(){
  const t = document.getElementById("todos");
  t.innerHTML="";
  todos.forEach((td,i)=>{
    t.innerHTML += `
      <div class="todo-row">
        <div>${td.text}</div>
        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  renderTodos();
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}
function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* INIT */
render();
weather();

</script>

</body>
</html>
