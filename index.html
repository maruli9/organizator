<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:#0b0f1a;
  color:white;
  font-family:system-ui;
  min-height:100vh;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:600;
}

/* SMART TIMER */
.timer-item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
}

.timer-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}

.timer-small{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 SMART TIMER PRO -->
<div class="card">
  <div class="timer-title">⏳ Next Events</div>
  <div id="nextEvents"></div>
</div>

<!-- WEATHER -->
<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading...</div>
</div>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<!-- ALARM -->
<div id="alarmBox">
  ⏰ EVENT ALARM<br><br>
  <div id="alarmText"></div>
  <button onclick="stopAlarm()">STOP</button>
</div>

<script>

/* DATA */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");
let editId = null;

/* WEATHER */
function weather(){
  const el = document.getElementById("weather");

  Promise.all([
    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.17&longitude=16.48&current_weather=true").then(r=>r.json()),
    fetch("https://api.open-meteo.com/v1/forecast?latitude=54.02&longitude=14.77&current_weather=true").then(r=>r.json())
  ])
  .then(([v,d])=>{
    el.innerHTML =
    `🌍 Vienna: ${v?.current_weather?.temperature ?? "?"}°C<br>
     🇵🇱 Dziwnów: ${d?.current_weather?.temperature ?? "?"}°C`;
  })
  .catch(()=> el.innerText="Weather error");
}

/* NOTIFICATIONS */
async function enableNotifications(){
  await Notification.requestPermission();
}

/* 🔊 AUDIO */
const alarmSound = new Audio("./alarm.mp3");
alarmSound.loop = true;

let audioUnlocked = false;

function unlockAudio(){
  if(audioUnlocked) return;
  alarmSound.play().then(()=>{
    alarmSound.pause();
    audioUnlocked = true;
  }).catch(()=>{});
}
document.addEventListener("click", unlockAudio, { once:true });

function startAlarmSound(){
  if(!audioUnlocked) return;
  alarmSound.currentTime = 0;
  alarmSound.play().catch(()=>{});
}

/* ALARM */
function triggerAlarm(ev){

  document.getElementById("alarmBox").style.display = "block";
  document.getElementById("alarmText").innerText = ev.name;

  startAlarmSound();

  if(Notification.permission === "granted"){
    new Notification("⏰ Event", { body: ev.name });
  }

  if(navigator.vibrate){
    navigator.vibrate([300,150,300,150,600]);
  }
}

function stopAlarm(){
  document.getElementById("alarmBox").style.display = "none";
  alarmSound.pause();
}

/* EVENTS */
function addEvent(){

  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  const t = new Date(`${date}T${time}`).getTime();

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name=name;
    ev.time=t;
    ev.alarm=alarm;
    ev.notified=false;
    editId=null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* SMART TIMER PRO */
function updateSmartTimer(){

  const now = Date.now();

  const next = events
    .filter(e=>e.time>now)
    .sort((a,b)=>a.time-b.time)
    .slice(0,3);

  const el = document.getElementById("nextEvents");

  if(next.length === 0){
    el.innerHTML = "<div class='timer-item'>No upcoming events</div>";
    return;
  }

  el.innerHTML = "";

  next.forEach(ev=>{

    const diff = ev.time - now;

    const h = Math.floor(diff/(1000*60*60));
    const m = Math.floor((diff/(1000*60))%60);
    const s = Math.floor((diff/1000)%60);

    el.innerHTML += `
      <div class="timer-item">
        <b>${ev.name}</b><br>
        <div class="timer-small">
          ⏱ ${h}h ${m}m ${s}s left
        </div>
      </div>
    `;
  });
}

/* LOOP */
setInterval(()=>{

  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      triggerAlarm(ev);
      ev.notified = true;
      save();
    }
  });

  events = events.filter(e=>e.time > now - 60000);
  save();

  render();
  updateSmartTimer();

},1000);

/* RENDER */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="timer-item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}
      </div>
    `;
  });
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

render();
weather();
updateSmartTimer();

</script>

</body>
</html>
