<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub + Gitara Mode</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:#0b0f1a;
  color:white;
  font-family:system-ui;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button{
  background:#6c5ce7;
  color:white;
}

/* EVENTS */
.event-row{
  display:grid;
  grid-template-columns: 1.2fr 1fr 1fr 0.6fr 0.6fr;
  gap:6px;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  font-size:13px;
}

.next-event{
  background:#1e272e;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.countdown{
  font-size:12px;
  opacity:0.8;
}

/* ALARM */
#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:red;
  z-index:9999;
  text-align:center;
  padding-top:35%;
  font-size:28px;
}

/* GITARA PANEL */
#guitarPanel{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>⏰ EVENT HUB</h1>

<button onclick="openGuitar()">🎸 Gitara</button>

<div id="nextEvents"></div>

<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

</div>

<!-- 🎸 GITARA PANEL -->
<div id="guitarPanel" class="container">

<h1>🎸 Gitara – System treningu</h1>

<div class="card">
<h2>📍 Najbliższa sesja</h2>
<div id="guitarNext">Brak zaplanowanej sesji</div>
</div>

<div class="card">
<h2>⏱ Faza</h2>
<div id="guitarPhase">IDLE</div>
</div>

<div class="card">
<h2>🎯 Wykonanie</h2>
<button onclick="startPractice()">START</button>
<button onclick="finishPractice()">DONE</button>
</div>

<div class="card">
<h2>📊 Feedback</h2>
<div id="guitarFeedback">Brak danych</div>
</div>

<button onclick="closeGuitar()">⬅ Wróć</button>

</div>

<!-- ALARM -->
<div id="alarmBox">
⏰ EVENT ALARM
<div id="alarmText"></div>
<button onclick="stopAlarm()">STOP</button>
</div>

<script>

/* EVENTS */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let editId = null;
let isAlarmActive = false;

/* GITARA STATE */
let guitarSession = {
  status: "idle"
};

/* PANEL SWITCH */
function openGuitar(){
  document.querySelector(".container").style.display = "none";
  document.getElementById("guitarPanel").style.display = "block";
}

function closeGuitar(){
  document.querySelector(".container").style.display = "block";
  document.getElementById("guitarPanel").style.display = "none";
}

/* GITARA LOGIC */
function updateGuitarUI(){
  document.getElementById("guitarPhase").innerText = guitarSession.status;
}

function startPractice(){
  guitarSession.status = "active";
  updateGuitarUI();
}

function finishPractice(){
  guitarSession.status = "done";
  document.getElementById("guitarFeedback").innerText =
    "✔ Sesja zakończona – utrzymujesz rytm";
  updateGuitarUI();
}

/* ALARM */
function triggerAlarm(ev){
  isAlarmActive = true;
  document.getElementById("alarmText").innerText = ev.name;
  document.getElementById("alarmBox").style.display="block";
}

function stopAlarm(){
  isAlarmActive = false;
  document.getElementById("alarmBox").style.display="none";
}

/* ADD EVENT */
function addEvent(){
  const name = document.getElementById("name").value;
  const t = new Date(`${date.value}T${time.value}`).getTime();
  const alarm = parseInt(document.getElementById("alarm").value);

  if(!name || !t) return;

  if(editId){
    const ev = events.find(e=>e.id===editId);
    Object.assign(ev,{name,time:t,alarm,notified:false});
    editId=null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* LOOP */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      triggerAlarm(ev);
      ev.notified=true;
    }
  });

  events = events.filter(e=>e.time > now);
  save();
  render();

},2000);

/* COUNTDOWN */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const el = document.querySelectorAll(`[data-id="${ev.id}"]`);
    el.forEach(e=>{
      const diff = ev.time-now;
      const s=Math.floor(diff/1000)%60;
      const m=Math.floor(diff/60000)%60;
      const h=Math.floor(diff/3600000)%24;
      const d=Math.floor(diff/86400000);
      e.innerText = `${d}d ${h}h ${m}m ${s}s`;
    });
  });

},1000);

/* RENDER */
function render(){

  events.sort((a,b)=>a.time-b.time);

  const next = document.getElementById("nextEvents");
  next.innerHTML="";

  events.slice(0,3).forEach(ev=>{
    next.innerHTML += `
      <div class="next-event">
        ${ev.name}<br>
        ${new Date(ev.time).toLocaleString()}<br>
        <div class="countdown" data-id="${ev.id}"></div>
      </div>
    `;
  });

  const e = document.getElementById("events");
  e.innerHTML="";

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="event-row">
        <div>${ev.name}</div>
        <div>${new Date(ev.time).toLocaleDateString()}</div>
        <div data-id="${ev.id}"></div>
        <button onclick="editEvent(${ev.id})">Edit</button>
        <button onclick="delEvent(${ev.id})">X</button>
      </div>
    `;
  });

  updateGuitarNext();
}

/* GITARA NEXT SESSION */
function updateGuitarNext(){
  const el = document.getElementById("guitarNext");

  if(events.length === 0){
    el.innerText = "Brak sesji";
    return;
  }

  const next = events[0];
  el.innerText = next.name + " – " + new Date(next.time).toLocaleString();
}

/* EDIT/DELETE */
function editEvent(id){
  const ev = events.find(e=>e.id===id);

  name.value=ev.name;
  date.value=new Date(ev.time).toISOString().split("T")[0];
  time.value=new Date(ev.time).toTimeString().slice(0,5);
  alarm.value=ev.alarm;

  editId=id;
}

function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* INIT */
render();

</script>

</body>
</html>
