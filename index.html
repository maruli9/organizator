<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub CLEAN UI</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#0b0f1a;
  color:white;
  font-family:system-ui;
}

.container{
  max-width:800px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  border-radius:14px;
  margin:12px 0;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button{
  background:#6c5ce7;
  color:white;
  cursor:pointer;
}

/* NEXT EVENTS */
.event{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  gap:10px;
}

/* LEFT INFO */
.info{
  flex:2;
}

/* BIG TIMER */
.timer{
  flex:1;
  font-size:20px;
  font-weight:700;
  text-align:center;
  color:#00d2ff;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:6px;
}

.actions button{
  width:auto;
  padding:6px 10px;
  font-size:12px;
}

/* EDIT MODE */
.editBox{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.editBox input{
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<h2>⏰ NEXT EVENTS</h2>

<div class="card">
  <input id="name" placeholder="Event name">
  <input id="date" type="date">
  <input id="time" type="time">

  <select id="alarm">
    <option value="5">5 min</option>
    <option value="10">10 min</option>
    <option value="15" selected>15 min</option>
  </select>

  <button onclick="addEvent()">Add event</button>
</div>

<div id="nextEvents"></div>

</div>

<script>

/* DATA */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let editId = null;

/* CLEAN OLD EVENTS ON START */
function clean(){
  const now = Date.now();
  const filtered = events.filter(e=>e.time>now);
  if(filtered.length!==events.length){
    events = filtered;
    save();
  }
}
clean();

/* ADD / EDIT */
function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = +document.getElementById("alarm").value;

  const t = new Date(`${date}T${time}`).getTime();
  if(!name || !t) return;

  if(editId){
    const ev = events.find(e=>e.id===editId);
    Object.assign(ev,{name,time:t,alarm,notified:false});
    editId=null;
  }else{
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* DELETE */
function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* EDIT */
function editEvent(id){
  const ev = events.find(e=>e.id===id);

  document.getElementById("name").value=ev.name;
  document.getElementById("date").value=new Date(ev.time).toISOString().split("T")[0];
  document.getElementById("time").value=new Date(ev.time).toTimeString().slice(0,5);
  document.getElementById("alarm").value=ev.alarm;

  editId=id;
}

/* TIMER FORMAT */
function format(ms){
  if(ms<=0) return "NOW";
  const s=Math.floor(ms/1000)%60;
  const m=Math.floor(ms/60000)%60;
  const h=Math.floor(ms/3600000)%24;
  const d=Math.floor(ms/86400000);

  return `${d}d ${h}h ${m}m ${s}s`;
}

/* RENDER */
function render(){
  events.sort((a,b)=>a.time-b.time);

  const wrap = document.getElementById("nextEvents");
  wrap.innerHTML="";

  events.slice(0,10).forEach(ev=>{
    const diff = ev.time - Date.now();

    wrap.innerHTML += `
      <div class="event">

        <div class="info">
          <b>${ev.name}</b><br>
          ${new Date(ev.time).toLocaleString()}
        </div>

        <div class="timer">
          ${format(diff)}
        </div>

        <div class="actions">
          <button onclick="editEvent(${ev.id})">Edit</button>
          <button onclick="delEvent(${ev.id})">X</button>
        </div>

      </div>
    `;
  });
}

/* LOOP (cleanup + alarm safe) */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff>0){
      ev.notified=true;
    }
  });

  const filtered = events.filter(e=>e.time>now);

  if(filtered.length!==events.length){
    events=filtered;
    save();
    render();
  }

},2000);

/* LIVE COUNTDOWN */
setInterval(render,1000);

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

render();

</script>

</body>
</html>
