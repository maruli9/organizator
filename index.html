<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Countdown + Planner</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Event">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#0f0f0f">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  -webkit-text-size-adjust: 100%;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  box-sizing: border-box;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  cursor:pointer;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>📅 Event Planner</h1>

<button onclick="enableNotifications()">Enable Notifications</button>

<div class="card">
<h2>📅 Event</h2>

<input id="eventName" placeholder="Event name"/>
<input id="eventDate" type="date"/>
<input id="eventTime" type="time"/>

<button onclick="saveEvent()">Save Event</button>

<h3 id="displayName"></h3>
<p id="countdown"></p>
</div>

<div class="card">
<h2>📝 Todo List</h2>

<input id="todoInput" placeholder="Add task"/>
<button onclick="addTodo()">Add</button>

<div id="todoList"></div>
</div>

<div class="card">
<h2>🌦 Weather</h2>

<p id="weather">Loading...</p>
<canvas id="chart"></canvas>
</div>

</div>

<script>

////////////////////////////////////////////////////
// 🔔 NOTIFICATIONS
////////////////////////////////////////////////////
function enableNotifications() {
  if (!("Notification" in window)) return;

  Notification.requestPermission().then(p => {
    if (p === "granted") {
      new Notification("Notifications enabled 🔔");
      localStorage.setItem("notif", "true");
    }
  });
}

////////////////////////////////////////////////////
// 📅 EVENT
////////////////////////////////////////////////////
function saveEvent(){
  const name = document.getElementById("eventName").value;
  const date = document.getElementById("eventDate").value;
  const time = document.getElementById("eventTime").value;

  localStorage.setItem("eventName", name);
  localStorage.setItem("eventDate", date);
  localStorage.setItem("eventTime", time);

  document.getElementById("displayName").innerText = name;

  updateCountdown();
}

function updateCountdown(){
  const name = localStorage.getItem("eventName") || "Event";
  const date = localStorage.getItem("eventDate");
  const time = localStorage.getItem("eventTime") || "00:00";

  if(!date){
    document.getElementById("countdown").innerText = "Set event date";
    return;
  }

  const eventDateTime = new Date(`${date}T${time}`);
  const now = new Date();
  const diff = eventDateTime - now;

  if(diff <= 0){
    document.getElementById("countdown").innerText = "Event is happening now 🔥";
    document.getElementById("displayName").innerText = name;
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);

  document.getElementById("countdown").innerText =
    `${days}d ${hours}h ${minutes}m left`;

  document.getElementById("displayName").innerText = name;
}

function initEvent(){
  const name = localStorage.getItem("eventName");
  const date = localStorage.getItem("eventDate");
  const time = localStorage.getItem("eventTime");

  if(name) document.getElementById("eventName").value = name;
  if(date) document.getElementById("eventDate").value = date;
  if(time) document.getElementById("eventTime").value = time;

  updateCountdown();
}

////////////////////////////////////////////////////
// 📝 TODO
////////////////////////////////////////////////////
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

function renderTodos(){
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  todos.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="todo-item";

    div.innerHTML = `
      <label>
        <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleTodo(${i})">
        <span style="text-decoration:${t.done ? "line-through" : "none"}">
          ${t.text}
        </span>
      </label>
      <button onclick="removeTodo(${i})">X</button>
    `;

    list.appendChild(div);
  });

  localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo(){
  const input = document.getElementById("todoInput");
  const val = input.value;

  if(val){
    todos.push({ text: val, done: false });
    input.value = "";
    renderTodos();
  }
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  renderTodos();
}

function removeTodo(i){
  todos.splice(i,1);
  renderTodos();
}

////////////////////////////////////////////////////
// 🌦 WEATHER
////////////////////////////////////////////////////
function loadWeather() {

  document.getElementById("weather").innerText = "Loading weather...";

  const fallbackLat = 48.2082;
  const fallbackLon = 16.3738;

  navigator.geolocation.getCurrentPosition(
    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
    () => fetchWeather(fallbackLat, fallbackLon),
    { timeout: 3000 }
  );
}

async function fetchWeather(lat, lon) {

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max&timezone=auto`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("weather").innerText =
      `Now: ${data.current_weather.temperature}°C`;

    const temps = data.daily.temperature_2m_max.slice(0,5);
    const labels = data.daily.time.slice(0,5);

    new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [{ label: "5 day temp", data: temps }]
      }
    });

  } catch (e) {
    document.getElementById("weather").innerText = "Weather error";
  }
}

////////////////////////////////////////////////////
// START APP
////////////////////////////////////////////////////
window.addEventListener("load", () => {
  initEvent();
  setInterval(updateCountdown, 1000);
  renderTodos();
  loadWeather();
});

</script>

</body>
</html>
