<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub FINAL</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:system-ui;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button{
  background:#6c5ce7;
  color:white;
}

.event-row{
  display:grid;
  grid-template-columns: 1.2fr 1fr 1fr 0.6fr 0.6fr;
  gap:6px;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  font-size:13px;
}

.next-event{
  background:#1e272e;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.countdown{
  font-size:12px;
  opacity:0.8;
}

/* ALARM */
#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:red;
  z-index:9999;
  text-align:center;
  padding-top:35%;
  font-size:28px;
}
</style>
</head>

<body>

<div class="container">

<h1>⏰ NEXT EVENTS</h1>
<div id="nextEvents"></div>

<div class="card">
<h2>📅 Events</h2>

<input id="nameInput" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarmSelect">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

</div>

<div id="alarmBox">
⏰ ALARM
<div id="alarmText"></div>
<button onclick="stopAlarm()">STOP</button>
</div>

<script>

let events = JSON.parse(localStorage.getItem("events") || "[]");
let editId = null;

/* AUDIO */
const alarmSound = new Audio("./alarm.mp3");
alarmSound.loop = true;
let audioUnlocked = false;

document.addEventListener("click", () => {
  if(audioUnlocked) return;
  alarmSound.play().then(()=>{
    alarmSound.pause();
    alarmSound.currentTime = 0;
    audioUnlocked = true;
  }).catch(()=>{});
},{once:true});

function startAlarmSound(){
  if(audioUnlocked){
    alarmSound.currentTime = 0;
    alarmSound.play().catch(()=>{});
  }
}

/* COUNTDOWN FORMAT */
function formatDiff(ms){
  if(ms <= 0) return "TERAZ";

  const s = Math.floor(ms/1000)%60;
  const m = Math.floor(ms/60000)%60;
  const h = Math.floor(ms/3600000)%24;
  const d = Math.floor(ms/86400000);

  return `${d}d ${h}h ${m}m ${s}s`;
}

/* ALARM */
function triggerAlarm(ev){
  document.getElementById("alarmText").innerText = ev.name;
  document.getElementById("alarmBox").style.display="block";
  startAlarmSound();
}

function stopAlarm(){
  document.getElementById("alarmBox").style.display="none";
  alarmSound.pause();
}

/* ADD */
function addEvent(){

  const name = nameInput.value;
  const t = new Date(`${date.value}T${time.value}`).getTime();
  const alarm = parseInt(alarmSelect.value);

  if(!name || !t) return;

  if(editId){
    const ev = events.find(e=>e.id===editId);
    Object.assign(ev,{name,time:t,alarm,notified:false});
    editId=null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* ALARM LOOP (lekki) */
setInterval(()=>{
  const now = Date.now();

  let changed=false;

  events.forEach(ev=>{
    const diff = ev.time-now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff>0){
      triggerAlarm(ev);
      ev.notified=true;
      changed=true;
    }
  });

  const before = events.length;
  events = events.filter(e=>e.time > now);

  if(before !== events.length) changed=true;

  if(changed){
    save();
    render();
  }

},2000);

/* ⏱ COUNTDOWN LOOP (co 1s – TYLKO tekst) */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const el = document.getElementById("cd-"+ev.id);
    if(el){
      el.innerText = formatDiff(ev.time - now);
    }
  });

},1000);

/* RENDER */
function render(){

  events.sort((a,b)=>a.time-b.time);

  const next = document.getElementById("nextEvents");
  next.innerHTML="";

  events.slice(0,3).forEach(ev=>{
    next.innerHTML += `
      <div class="next-event">
        ${ev.name}<br>
        ${new Date(ev.time).toLocaleString()}<br>
        <div class="countdown" id="cd-${ev.id}"></div>
      </div>
    `;
  });

  const e = document.getElementById("events");
  e.innerHTML="";

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="event-row">
        <div>${ev.name}</div>
        <div>${new Date(ev.time).toLocaleDateString()}</div>
        <div id="cd-${ev.id}"></div>
        <button onclick="editEvent(${ev.id})">Edit</button>
        <button onclick="delEvent(${ev.id})">X</button>
      </div>
    `;
  });
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* EDIT */
function editEvent(id){
  const ev = events.find(e=>e.id===id);

  nameInput.value=ev.name;
  date.value=new Date(ev.time).toISOString().split("T")[0];
  time.value=new Date(ev.time).toTimeString().slice(0,5);
  alarmSelect.value=ev.alarm;

  editId=id;
}

/* DELETE */
function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* INIT */
render();

</script>

</body>
</html>
