<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO MAX v3</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{max-width:720px;margin:auto;padding:16px;}

.card{
  background:rgba(255,255,255,0.06);
  padding:16px;
  margin:12px 0;
  border-radius:16px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{background:#6c5ce7;color:white;font-weight:bold;}

.item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO MAX v3</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- EVENT FORM -->
<div class="card">
<h2>📅 Event</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min before</option>
  <option value="10">10 min before</option>
  <option value="15" selected>15 min before</option>
  <option value="30">30 min before</option>
</select>

<button onclick="addEvent()">Add / Save event</button>

<div id="events"></div>
</div>

</div>

<script>

/* =========================
   DATA
========================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");

/* =========================
   NOTIFICATIONS
========================= */
async function enableNotifications(){
  const p = await Notification.requestPermission();
  alert("Permission: " + p);

  if(p==="granted"){
    new Notification("PRO MAX v3",{
      body:"Notifications enabled"
    });
  }
}

function notify(title, body){
  if(Notification.permission==="granted"){
    new Notification(title,{body});
  }
}

/* =========================
   ADD / EDIT EVENT
========================= */
function addEvent(editId=null){

  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  if(!name || !date || !time) return;

  const timeMs = new Date(`${date}T${time}`).getTime();

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name = name;
    ev.time = timeMs;
    ev.alarm = alarm;
    ev.notified = false;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:timeMs,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* =========================
   DELETE
========================= */
function del(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* =========================
   EDIT (FIX #1)
========================= */
function edit(id){
  const ev = events.find(e=>e.id===id);

  document.getElementById("name").value = ev.name;
  document.getElementById("date").value = new Date(ev.time).toISOString().split("T")[0];
  document.getElementById("time").value = new Date(ev.time).toTimeString().slice(0,5);
  document.getElementById("alarm").value = ev.alarm;

  // override button
  document.querySelector("button[onclick='addEvent()']")
    .onclick = ()=>addEvent(id);
}

/* =========================
   SAVE
========================= */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* =========================
   LOOP (ALARM + AUTO DELETE)
========================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{

    const diff = ev.time - now;

    // 🔔 CUSTOM ALARM (FIX #2)
    if(!ev.notified && diff <= ev.alarm*60*1000 && diff > 0){
      notify("⏰ Event soon", ev.name);
      ev.notified = true;
      save();
    }

  });

  // 🧹 AUTO DELETE PAST EVENTS (FIX #3)
  events = events.filter(e => e.time > now - 60*1000);
  save();

  render();

},3000);

/* =========================
   RENDER
========================= */
function render(){
  const el = document.getElementById("events");
  el.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    el.innerHTML += `
      <div class="item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}<br>
        ⏰ alarm: ${ev.alarm} min<br><br>

        <button onclick="edit(${ev.id})">Edit</button>
        <button onclick="del(${ev.id})">Delete</button>
      </div>
    `;
  });
}

/* INIT */
render();

</script>

</body>
</html>
