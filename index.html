<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub STABLE MOBILE FIX</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:#0b0f1a;
  color:white;
  font-family:system-ui;
  height:100%;
}

/* 🔥 FIX IOS “pływania” */
body{
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:600;
}

/* EVENT */
.event-row{
  display:grid;
  grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 0.6fr;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  font-size:13px;
}

/* TODO */
.todo-row{
  display:grid;
  grid-template-columns: 40px 1fr 50px;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* 🔴 ALARM FIXED (NO SHIFT) */
#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,0,0,0.92);
  z-index:9999;
  text-align:center;
  padding-top:35%;
  font-size:28px;
  animation:pulse .8s infinite;
}

#alarmBox button{
  margin-top:20px;
  padding:14px;
  font-size:18px;
  background:white;
  color:black;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub STABLE MOBILE FIX</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading...</div>
</div>

<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<!-- ALARM -->
<div id="alarmBox">
  ⏰ EVENT ALARM<br><br>
  <div id="alarmText"></div>
  <button onclick="stopAlarm()">STOP</button>
</div>

<script>

/* DATA */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");
let editId = null;

/* 🌦 WEATHER (fixed) */
function weather(){
  const el = document.getElementById("weather");

  Promise.all([
    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.17&longitude=16.48&current_weather=true").then(r=>r.json()),
    fetch("https://api.open-meteo.com/v1/forecast?latitude=54.02&longitude=14.77&current_weather=true").then(r=>r.json())
  ])
  .then(([v,d])=>{
    el.innerHTML =
    `🌍 Vienna: ${v?.current_weather?.temperature ?? "?"}°C<br>
     🇵🇱 Dziwnów: ${d?.current_weather?.temperature ?? "?"}°C`;
  })
  .catch(()=> el.innerText="Weather error");
}

/* 🔔 NOTIFICATIONS (BACK AGAIN) */
async function enableNotifications(){
  const p = await Notification.requestPermission();
  alert("Permission: " + p);
}

/* 🔊 AUDIO */
const alarmSound = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
alarmSound.loop = true;

let audioUnlocked = false;

function unlockAudio(){
  if(audioUnlocked) return;

  alarmSound.play().then(()=>{
    alarmSound.pause();
    alarmSound.currentTime = 0;
    audioUnlocked = true;
  }).catch(()=>{});
}

document.addEventListener("click", unlockAudio, { once:true });

/* 🔥 ALARM */
function triggerAlarm(ev){

  document.getElementById("alarmText").innerText = ev.name;
  document.getElementById("alarmBox").style.display = "block";

  if(audioUnlocked){
    alarmSound.currentTime = 0;
    alarmSound.play().catch(()=>{});
  }

  if(Notification.permission === "granted"){
    new Notification("⏰ Event", { body: ev.name });
  }

  if(navigator.vibrate){
    navigator.vibrate([300,150,300,150,500]);
  }
}

function stopAlarm(){
  document.getElementById("alarmBox").style.display = "none";
  alarmSound.pause();
  alarmSound.currentTime = 0;
}

/* EVENTS */
function addEvent(){

  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  const t = new Date(`${date}T${time}`).getTime();

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name=name; ev.time=t; ev.alarm=alarm;
    ev.notified=false;
    editId=null;
  } else {
    events.push({id:Date.now(),name,time:t,alarm,notified:false});
  }

  save(); render();
}

/* LOOP */
setInterval(()=>{

  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      triggerAlarm(ev);
      ev.notified = true;
      save();
    }
  });

  events = events.filter(e=>e.time > now - 60000);
  save();
  render();

},3000);

/* RENDER */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="event-row">
        <div>${ev.name}</div>
        <div>${new Date(ev.time).toLocaleDateString()}</div>
        <div>${new Date(ev.time).toTimeString().slice(0,5)}</div>
        <button onclick="editEvent(${ev.id})">Edit</button>
        <button onclick="delEvent(${ev.id})">X</button>
      </div>
    `;
  });

  const t=document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="todo-row">
        <input type="checkbox" ${x.done?"checked":""} onchange="toggleTodo(${i})">
        <div>${x.text}</div>
        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}
function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* TODO */
function addTodo(){
  const v=document.getElementById("todoInput").value;
  if(!v)return;
  todos.push({text:v,done:false});
  saveTodos(); render();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  saveTodos(); render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos(); render();
}

function editEvent(id){
  const ev=events.find(e=>e.id===id);
  document.getElementById("name").value=ev.name;
  document.getElementById("date").value=new Date(ev.time).toISOString().split("T")[0];
  document.getElementById("time").value=new Date(ev.time).toTimeString().slice(0,5);
  document.getElementById("alarm").value=ev.alarm;
  editId=id;
}

function delEvent(id){
  events=events.filter(e=>e.id!==id);
  save(); render();
}

render();
weather();

</script>

</body>
</html>
