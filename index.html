<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Countdown + Planner</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Event">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#0f0f0f">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: Arial;
  background:#0f0f0f;
  color:white;

  /* ważne dla iOS PWA */
  -webkit-text-size-adjust: 100%;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  box-sizing: border-box;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  cursor:pointer;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>📅 Event Planner</h1>
<button onclick="enableNotifications()">Enable Notifications</button>
<!-- EVENT -->
<div class="card">
<h2>📅 Event</h2>
<input id="eventName" placeholder="Event name"/>
<input id="eventDate" type="date"/>
<input id="eventTime" type="time"/>
<button onclick="saveEvent()">Save Event</button>

<h3 id="displayName"></h3>
<p id="countdown"></p>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Todo List</h2>
<input id="todoInput" placeholder="Add task"/>
<button onclick="addTodo()">Add</button>
<div id="todoList"></div>
</div>

<!-- WEATHER -->
<div class="card">
<h2>🌦 Weather</h2>
<p id="weather">Loading...</p>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// ---------------- EVENT ----------------
function saveEvent(){
  const name = document.getElementById("eventName").value;
  const date = document.getElementById("eventDate").value;
  const time = document.getElementById("eventTime").value;

  localStorage.setItem("eventName", name);
  localStorage.setItem("eventDate", date);
  localStorage.setItem("eventTime", time);

  updateCountdown();
}

function updateCountdown(){
  const name = localStorage.getItem("eventName") || "Event";
  const date = localStorage.getItem("eventDate");
  const time = localStorage.getItem("eventTime") || "00:00";

  if(!date){
    document.getElementById("countdown").innerText = "Set event date";
    return;
  }

  const eventDateTime = new Date(`${date}T${time}`);
  const now = new Date();

  const diff = eventDateTime - now;

  if(diff <= 0){
    document.getElementById("countdown").innerText =
      `${name} is happening now 🔥`;
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);

  document.getElementById("displayName").innerText = name;
  document.getElementById("countdown").innerText =
    `${days}d ${hours}h ${minutes}m left`;

  // 🔔 NOTIFICATION 15 MIN BEFORE
  const notifEnabled = localStorage.getItem("notif") === "true";

  const fifteenMin = 15 * 60 * 1000;

  if(notifEnabled && diff > 0 && diff <= fifteenMin){
    new Notification(`⏰ ${name} starts in 15 minutes!`);
  }
}

// live update
updateCountdown();
setInterval(updateCountdown, 1000);


// ---------------- TODO ----------------
// ---------------- TODO ----------------
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

function renderTodos(){
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  todos.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="todo-item";

    div.innerHTML = `
      <label>
        <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleTodo(${i})">
        <span style="text-decoration:${t.done ? "line-through" : "none"}">
          ${t.text}
        </span>
      </label>
      <button onclick="removeTodo(${i})">X</button>
    `;

    list.appendChild(div);
  });

  localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo(){
  const input = document.getElementById("todoInput");
  const val = input.value;

  if(val){
    todos.push({ text: val, done: false });
    input.value = "";
    renderTodos();
  }
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  renderTodos();
}

function removeTodo(i){
  todos.splice(i,1);
  renderTodos();
}

// start
renderTodos();
// ---------------- WEATHER ----------------
const mockTemp = Array.from({length:10},()=>Math.floor(Math.random()*10+10));

document.getElementById("weather").innerText =
"Temp: 18°C | Pressure: 1015 hPa";

new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: ["-5","-4","-3","-2","-1","Today","+1","+2","+3","+4"],
    datasets: [{
      label: "Temperature",
      data: mockTemp
    }]
  }
});


function enableNotifications() {
  if (!("Notification" in window)) {
    alert("Notifications not supported");
    return;
  }

  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      new Notification("Notifications enabled 🔔");
      localStorage.setItem("notif", "true");
    }
  });
}

</script>

</body>
</html>
