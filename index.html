<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Hub Pro FIX</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:16px;
  margin:12px 0;
  border-radius:16px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub Pro FIX</h1>

<button onclick="enableNotifications()">🔔 Enable notifications</button>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name"/>
<input id="date" type="date"/>
<input id="time" type="time"/>
<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Tasks</h2>

<input id="todoInput" placeholder="Task"/>
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

<!-- WEATHER -->
<div class="card">
<h2>🌦 Weather</h2>
<p id="weather">Loading...</p>
</div>

</div>

<script>

/* ======================
   DATA
====================== */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* ======================
   NOTIFICATIONS
====================== */
function enableNotifications(){
  if(!("Notification" in window)){
    alert("No notifications support");
    return;
  }

  Notification.requestPermission().then(p=>{
    alert("Permission: " + p);

    if(p==="granted"){
      new Notification("Event Hub Pro",{
        body:"Notifications enabled"
      });
    }
  });
}

function notify(title, body){
  if(Notification.permission==="granted"){
    new Notification(title,{body});
  }
}

/* ======================
   EVENTS (FIXED)
====================== */
function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if(!name || !date || !time) return;

  events.push({
    id:Date.now(),
    name,
    time:new Date(`${date}T${time}`).getTime(),
    notified:false
  });

  saveEvents();
  renderEvents();
}

function saveEvents(){
  localStorage.setItem("events",JSON.stringify(events));
}

function renderEvents(){
  const el = document.getElementById("events");
  el.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    el.innerHTML += `
      <div class="item">
        <b>${ev.name}</b><br>
        <span id="t-${ev.id}"></span>
        <button onclick="deleteEvent(${ev.id})">Delete</button>
      </div>
    `;
  });
}

function deleteEvent(id){
  events = events.filter(e=>e.id!==id);
  saveEvents();
  renderEvents();
}

/* ======================
   EVENT LOOP (FIXED)
====================== */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    const el = document.getElementById(`t-${ev.id}`);
    if(el){
      if(diff <= 0){
        el.innerText = "🔥 NOW";
      } else {
        const m = Math.floor(diff/60000);
        const h = Math.floor(m/60);
        el.innerText = `${h}h ${m%60}m`;
      }
    }

    // 15 min alert FIXED (no narrow window bug)
    if(!ev.notified && diff <= 15*60*1000 && diff > 0){
      notify("Event soon ⚡", ev.name + " starts in 15 minutes");
      ev.notified = true;
      saveEvents();
    }
  });

},1000);

/* ======================
   TODO (FIXED)
====================== */
function addTodo(){
  const val = document.getElementById("todoInput").value;
  if(!val) return;

  todos.push({text:val,done:false});
  document.getElementById("todoInput").value="";
  saveTodos();
  renderTodos();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  saveTodos();
  renderTodos();
}

function deleteTodo(i){
  todos.splice(i,1);
  saveTodos();
  renderTodos();
}

function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

function renderTodos(){
  const el = document.getElementById("todos");
  el.innerHTML="";

  todos.forEach((t,i)=>{
    el.innerHTML += `
      <div class="item">
        <input type="checkbox" ${t.done?"checked":""}
        onchange="toggleTodo(${i})">
        ${t.text}
        <button onclick="deleteTodo(${i})">X</button>
      </div>
    `;
  });
}

/* ======================
   WEATHER (FIXED - NO HANG)
====================== */
function loadWeather(lat,lon){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("weather").innerText =
      "🌡 " + d.current_weather.temperature + "°C";
  })
  .catch(()=>{
    document.getElementById("weather").innerText="Weather error";
  });
}

function initWeather(){
  const fallback={lat:48.2082,lon:16.3738};

  if(!navigator.geolocation){
    loadWeather(fallback.lat,fallback.lon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    p=>loadWeather(p.coords.latitude,p.coords.longitude),
    ()=>loadWeather(fallback.lat,fallback.lon),
    {timeout:3000}
  );
}

/* ======================
   INIT
====================== */
window.onload=()=>{
  renderEvents();
  renderTodos();
  initWeather();
};

</script>

</body>
</html>
