<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO MAX 4.1</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{
  max-width:720px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:600;
}

/* EVENT ROW (STABLE V4 STYLE) */
.event-row{
  display:grid;
  grid-template-columns: 1.4fr 1fr 0.6fr 0.6fr;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  font-size:13px;
}

/* TODO ROW */
.todo-row{
  display:grid;
  grid-template-columns: 40px 1fr 50px;
  gap:6px;
  align-items:center;
  padding:8px;
  margin-top:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* WEATHER FIX */
#weather{
  font-size:18px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO MAX 4.1</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- WEATHER (FIXED + ISOLATED) -->
<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading weather...</div>
</div>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
  <option value="30">30 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>📝 Todo</h2>

<input id="todoInput" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<script>

/* =========================
   DATA
========================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* =========================
   NOTIFICATIONS
========================= */
async function enableNotifications(){
  const p = await Notification.requestPermission();
  alert("Permission: " + p);
}

/* =========================
   WEATHER (SAFE MODULE - NEVER BREAKS APP)
========================= */
function initWeather(){
  const el = document.getElementById("weather");

  const fallback = { lat: 48.2082, lon: 16.3738 };

  let done = false;

  const timeout = setTimeout(()=>{
    if(!done){
      el.innerText = "🌦 Weather timeout (fallback)";
      done = true;
    }
  }, 3500);

  function load(lat, lon){
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
      .then(r => r.json())
      .then(d => {
        if(done) return;
        clearTimeout(timeout);

        if(d && d.current_weather){
          el.innerText = "🌡 " + d.current_weather.temperature + "°C";
        } else {
          el.innerText = "Weather unavailable";
        }

        done = true;
      })
      .catch(()=>{
        if(done) return;
        clearTimeout(timeout);
        el.innerText = "Weather error";
        done = true;
      });
  }

  if(!navigator.geolocation){
    load(fallback.lat, fallback.lon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => load(pos.coords.latitude, pos.coords.longitude),
    () => load(fallback.lat, fallback.lon),
    { timeout: 3000 }
  );
}

/* =========================
   EVENTS
========================= */
function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  if(!name || !date || !time) return;

  events.push({
    id:Date.now(),
    name,
    time:new Date(`${date}T${time}`).getTime(),
    alarm,
    notified:false
  });

  save();
  render();
}

/* DELETE */
function delEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

/* =========================
   TODO
========================= */
function addTodo(){
  const v = document.getElementById("todoInput").value;
  if(!v) return;

  todos.push({text:v,done:false});
  document.getElementById("todoInput").value="";
  saveTodos();
  render();
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  saveTodos();
  render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  render();
}

/* =========================
   LOOP
========================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      if(Notification.permission==="granted"){
        new Notification("⏰ Event", { body: ev.name });
      }
      ev.notified = true;
      save();
    }
  });

  events = events.filter(e => e.time > now - 60000);
  save();

  render();

},3000);

/* =========================
   RENDER (STABLE)
========================= */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="event-row">
        <div>${ev.name}</div>
        <div>${new Date(ev.time).toLocaleDateString()}</div>
        <div>${new Date(ev.time).toTimeString().slice(0,5)}</div>
        <button onclick="delEvent(${ev.id})">X</button>
      </div>
    `;
  });

  const t = document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="todo-row">
        <input type="checkbox" ${x.done?"checked":""}
        onchange="toggleTodo(${i})">

        <div style="text-decoration:${x.done?'line-through':'none'}">
          ${x.text}
        </div>

        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });

}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}
function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* INIT */
render();
initWeather();

</script>

</body>
</html>
