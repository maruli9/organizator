<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Hub Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --accent:#6c5ce7;
  --text:#fff;
}

body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#1a1f35,#0b0f1a);
  color:var(--text);
}

.container{
  max-width:720px;
  margin:auto;
  padding:18px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

.card{
  background:var(--card);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:16px;
  margin:12px 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button{
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.event{
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.04);
  margin-top:10px;
}

.small{
  opacity:0.8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub Pro</h1>

<button onclick="enableNotifications()">🔔 Enable notifications</button>

<div class="card">
<h2>➕ Add Event</h2>

<input id="name" placeholder="Event name"/>
<input id="date" type="date"/>
<input id="time" type="time"/>

<button onclick="addEvent()">Save event</button>
</div>

<div class="card">
<h2>📅 Events</h2>
<div id="events"></div>
</div>

<div class="card">
<h2>🌦 Weather</h2>
<p id="weather">Loading...</p>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let events = JSON.parse(localStorage.getItem("events") || "[]");
let chartInstance = null;

/* ---------------------------
   NOTIFICATIONS
----------------------------*/
function enableNotifications(){
  if(!("Notification" in window)) return;

  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      new Notification("Event Hub Pro",{
        body:"Notifications enabled"
      });
    }
  });
}

function notify(title, body){
  if(Notification.permission === "granted"){
    new Notification(title,{body});
  }
}

/* ---------------------------
   EVENTS
----------------------------*/
function addEvent(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if(!name || !date || !time) return;

  const datetime = new Date(`${date}T${time}`).getTime();

  events.push({
    id:Date.now(),
    name,
    datetime,
    notified:false
  });

  save();
  render();
}

function deleteEvent(id){
  events = events.filter(e=>e.id!==id);
  save();
  render();
}

function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

function render(){
  const el = document.getElementById("events");
  el.innerHTML="";

  events.sort((a,b)=>a.datetime-b.datetime);

  events.forEach(ev=>{
    const div = document.createElement("div");
    div.className="event";

    div.innerHTML=`
      <b>${ev.name}</b><br>
      <span class="small">${new Date(ev.datetime).toLocaleString()}</span>
      <p id="t-${ev.id}"></p>
      <button onclick="deleteEvent(${ev.id})">Delete</button>
    `;

    el.appendChild(div);
  });
}

/* ---------------------------
   TIMER ENGINE (CORE FIX)
----------------------------*/
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.datetime - now;
    const label = document.getElementById(`t-${ev.id}`);

    if(label){
      if(diff <= 0){
        label.innerText = "🔥 NOW";
      } else {
        const min = Math.floor(diff/60000);
        const hr = Math.floor(min/60);
        label.innerText = `${hr}h ${min%60}m left`;
      }
    }

    // 15 min alert
    if(!ev.notified && diff <= 15*60*1000 && diff > 14*60*1000){
      notify("Upcoming event ⚡", ev.name + " starts in 15 minutes");
      ev.notified = true;
      save();
    }
  });

},1000);

/* ---------------------------
   WEATHER (FIXED)
----------------------------*/
function loadWeather(lat,lon){

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max&timezone=auto`;

  fetch(url)
  .then(r=>r.json())
  .then(data=>{

    document.getElementById("weather").innerText =
      `Now: ${data.current_weather.temperature}°C`;

    const labels = data.daily.time.slice(0,5);
    const temps = data.daily.temperature_2m_max.slice(0,5);

    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(
      document.getElementById("chart"),
      {
        type:"line",
        data:{
          labels,
          datasets:[{
            label:"Temp",
            data:temps
          }]
        }
      }
    );
  })
  .catch(()=>{
    document.getElementById("weather").innerText="Weather error";
  });
}

function initWeather(){
  navigator.geolocation.getCurrentPosition(
    p=>loadWeather(p.coords.latitude,p.coords.longitude),
    ()=>loadWeather(48.2082,16.3738)
  );
}

/* ---------------------------
   INIT
----------------------------*/
window.onload=()=>{
  render();
  initWeather();
};

</script>

</body>
</html>
