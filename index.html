<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PWA Calendar FIX</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{ max-width:900px; margin:auto; padding:16px; }

.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
}

button,input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button{ background:#6c5ce7; color:white; }

.grid{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
}

.day{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:8px;
  min-height:60px;
  font-size:12px;
  cursor:pointer;
}

.today{ outline:2px solid #6c5ce7; }

.event-dot{
  width:6px;height:6px;
  background:red;
  border-radius:50%;
  display:inline-block;
  margin-right:3px;
}
#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:red;
  z-index:9999;
  text-align:center;
  padding-top:30%;
  font-size:28px;
}
</style>
</head>

<body>

<div class="container">

<h1>📅 Calendar + PWA Event Hub</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<div class="card">
<h2>📆 Calendar</h2>
<div id="calendar"></div>
</div>

<div class="card">
<h2>➕ Add Event</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
<option value="1">1 min</option>
<option value="5">5 min</option>
<option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add</button>

<div id="eventList"></div>
</div>

</div>

<div id="alarmBox">
⏰ ALARM
<div id="alarmText"></div>
<button onclick="stopAlarm()">STOP</button>
</div>

<script>

/* ===================== STORAGE ===================== */
let events = JSON.parse(localStorage.getItem("events") || "[]");

/* ===================== SAFETY FIX (RELOAD BUG) ===================== */
const BOOT_TIME = Date.now();

/* ===================== NOTIFICATIONS FIX ===================== */
async function enableNotifications(){
  if(!("Notification" in window)){
    alert("No Notification API");
    return;
  }

  const perm = await Notification.requestPermission();

  if(perm === "granted"){
    new Notification("Notifications enabled ✅");
  }
}

/* ===================== PWA SERVICE WORKER ===================== */
if("serviceWorker" in navigator){

  const swCode = `
  self.addEventListener('install', e=>{
    self.skipWaiting();
  });

  self.addEventListener('fetch', e=>{
    e.respondWith(fetch(e.request).catch(()=> caches.match(e.request)));
  });
  `;

  const blob = new Blob([swCode], {type:"text/javascript"});
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL);
}

/* ===================== AUDIO ===================== */
const alarmSound = new Audio();
alarmSound.src = "data:audio/mp3;base64,";
alarmSound.loop = true;

let unlocked = false;

document.addEventListener("click", ()=>{
  if(unlocked) return;
  alarmSound.play().then(()=>{
    alarmSound.pause();
    unlocked = true;
  }).catch(()=>{});
},{once:true});

/* ===================== ALARM SYSTEM FIX ===================== */
let alarmActive = false;
let alarmLock = false;

function triggerAlarm(ev){

  if(alarmLock) return;
  alarmLock = true;
  alarmActive = true;

  document.getElementById("alarmText").innerText = ev.name;
  document.getElementById("alarmBox").style.display="block";

  alarmSound.currentTime = 0;
  alarmSound.play().catch(()=>{});

  if(Notification.permission==="granted"){
    new Notification("⏰ " + ev.name);
  }
}

function stopAlarm(){
  alarmActive = false;
  alarmLock = false;

  document.getElementById("alarmBox").style.display="none";
  alarmSound.pause();
}

/* ===================== ADD EVENT ===================== */
function addEvent(){

  const name = nameInput.value;
  const t = new Date(date.value+"T"+time.value).getTime();
  const alarm = +document.getElementById("alarm").value;

  if(!name || !t) return;

  events.push({
    id:Date.now(),
    name,
    time:t,
    alarm,
    notified:false
  });

  save();
  render();
}

/* ===================== MAIN LOOP (FIXED) ===================== */
setInterval(()=>{

  const now = Date.now();

  events.forEach(ev=>{

    const diff = ev.time - now;

    /* 🔥 FIX: blokada po reload + brak natychmiastowego triggera */
    if(
      ev.notified === false &&
      diff > 0 &&
      diff <= ev.alarm*60000 &&
      now - BOOT_TIME > 5000   // <- KLUCZOWY FIX
    ){
      triggerAlarm(ev);
      ev.notified = true;
    }
  });

  events = events.filter(e => e.time > now - 60000);

  save();

},2000);

/* ===================== CALENDAR ===================== */
function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);

  const startDay = first.getDay() || 7;

  cal.innerHTML += `<h3>${year}-${month+1}</h3>`;

  const grid = document.createElement("div");
  grid.className="grid";

  for(let i=1;i<startDay;i++){
    grid.innerHTML += `<div></div>`;
  }

  for(let d=1; d<=last.getDate(); d++){

    const dateStr = new Date(year,month,d).toDateString();

    const hasEvent = events.some(e =>
      new Date(e.time).toDateString() === dateStr
    );

    grid.innerHTML += `
      <div class="day ${d===now.getDate()?'today':''}" onclick="showDay('${dateStr}')">
        ${d}
        ${hasEvent?'<div class="event-dot"></div>':''}
      </div>
    `;
  }

  cal.appendChild(grid);
}

/* ===================== DAY VIEW ===================== */
function showDay(dateStr){

  const list = events.filter(e =>
    new Date(e.time).toDateString() === dateStr
  );

  document.getElementById("eventList").innerHTML =
    "<h3>"+dateStr+"</h3>" +
    list.map(e=>`
      <div class="card">
        ${e.name}<br>
        ${new Date(e.time).toLocaleTimeString()}
      </div>
    `).join("");
}

/* ===================== RENDER ===================== */
function render(){
  renderCalendar();
}

/* ===================== SAVE ===================== */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* ===================== INIT ===================== */
render();

</script>

</body>
</html>
