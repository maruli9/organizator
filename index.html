<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Hub PRO MAX</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

.container{max-width:700px;margin:auto;padding:16px;}

.card{
  background:rgba(255,255,255,0.06);
  padding:16px;
  margin:12px 0;
  border-radius:16px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{background:#6c5ce7;color:white;font-weight:bold;}

.item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Event Hub PRO MAX</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<div class="card">
<h2>➕ Event</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">
<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<div class="card">
<h2>📝 Tasks</h2>

<input id="todo" placeholder="Task">
<button onclick="addTodo()">Add</button>

<div id="todos"></div>
</div>

</div>

<script>

/* =======================
   DATA
======================= */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

/* =======================
   SW (PWA)
======================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

/* =======================
   NOTIFICATIONS
======================= */
async function enableNotifications(){
  const perm = await Notification.requestPermission();

  if(perm === "granted"){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification("PRO MAX",{
        body:"Notifications enabled"
      });
    });
  }
}

function notify(title, body){
  navigator.serviceWorker.ready.then(reg=>{
    reg.showNotification(title,{body});
  });
}

/* =======================
   EVENTS
======================= */
function addEvent(){
  const name = name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if(!name || !date || !time) return;

  const timeMs = new Date(`${date}T${time}`).getTime();

  events.push({
    id:Date.now(),
    name,
    time:timeMs,
    notified15:false,
    notified5:false
  });

  save();
  render();
}

function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* =======================
   LOOP (15m + 5m + NOW)
======================= */
setInterval(()=>{
  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(diff <= 15*60*1000 && !ev.notified15){
      notify("⏰ 15 min", ev.name);
      ev.notified15 = true;
      save();
    }

    if(diff <= 5*60*1000 && !ev.notified5){
      notify("🔥 5 min", ev.name);
      ev.notified5 = true;
      save();
    }

    if(diff <= 0){
      notify("🚨 NOW", ev.name);
    }
  });

},5000);

/* =======================
   RENDER
======================= */
function render(){
  const el = document.getElementById("events");
  el.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    el.innerHTML += `
      <div class="item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}
      </div>
    `;
  });

  const t = document.getElementById("todos");
  t.innerHTML="";

  todos.forEach((x,i)=>{
    t.innerHTML += `
      <div class="item">
        <input type="checkbox" ${x.done?"checked":""}
        onchange="toggleTodo(${i})">
        ${x.text}
        <button onclick="delTodo(${i})">X</button>
      </div>
    `;
  });
}

/* =======================
   TODO
======================= */
function addTodo(){
  const v = document.getElementById("todo").value;
  if(!v) return;

  todos.push({text:v,done:false});
  document.getElementById("todo").value="";
  saveTodos();
  render();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  saveTodos();
  render();
}

function delTodo(i){
  todos.splice(i,1);
  saveTodos();
  render();
}

function saveTodos(){
  localStorage.setItem("todos",JSON.stringify(todos));
}

/* INIT */
render();

</script>

</body>
</html>
