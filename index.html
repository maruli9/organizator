<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Hub</title>

<style>

/* 🔒 FIX PŁYWANIA (iOS + Android) */
html, body {
  margin:0;
  padding:0;
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
  -webkit-text-size-adjust:100%;
}

body{
  min-height:100vh;
  min-height:100dvh;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:720px;
  margin:auto;
  padding:16px;
  box-sizing:border-box;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  padding:14px;
  margin:12px 0;
  border-radius:14px;
  width:100%;
  box-sizing:border-box;
}

/* INPUTS */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:15px;
  box-sizing:border-box;
}

button{
  background:#6c5ce7;
  color:white;
  font-weight:600;
}

/* EVENT ITEM */
.timer-item{
  padding:10px;
  margin-top:8px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  width:100%;
  box-sizing:border-box;
  word-break:break-word;
}

/* 🔴 ALARM SCREEN */
#alarmBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,0,0,0.95);
  z-index:9999;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;
  padding:20px;

  animation:pulse 0.8s infinite;
}

#alarmText{
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
}

#alarmBox button{
  padding:18px 30px;
  font-size:20px;
  border-radius:12px;
  border:none;
  background:white;
  color:black;
  font-weight:700;
  width:auto;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<h1>Event Hub</h1>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>

<!-- WEATHER -->
<div class="card">
<h2>🌦 Weather</h2>
<div id="weather">Loading...</div>
</div>

<!-- EVENTS -->
<div class="card">
<h2>📅 Events</h2>

<input id="name" placeholder="Event name">
<input id="date" type="date">
<input id="time" type="time">

<select id="alarm">
  <option value="5">5 min</option>
  <option value="10">10 min</option>
  <option value="15" selected>15 min</option>
</select>

<button onclick="addEvent()">Add event</button>

<div id="events"></div>
</div>

<!-- SMART NEXT EVENTS -->
<div class="card">
<h2>⏳ Upcoming Events</h2>
<div id="nextEvents"></div>
</div>

</div>

<!-- 🔴 ALARM -->
<div id="alarmBox">
  <div id="alarmText"></div>
  <button onclick="stopAlarm()">STOP</button>
</div>

<script>

/* DATA */
let events = JSON.parse(localStorage.getItem("events") || "[]");
let editId = null;

/* WEATHER */
function weather(){
  const el = document.getElementById("weather");

  Promise.all([
    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.17&longitude=16.48&current_weather=true").then(r=>r.json()),
    fetch("https://api.open-meteo.com/v1/forecast?latitude=54.02&longitude=14.77&current_weather=true").then(r=>r.json())
  ])
  .then(([v,d])=>{
    el.innerHTML =
    `🌍 Vienna: ${v?.current_weather?.temperature ?? "?"}°C<br>
     🇵🇱 Dziwnów: ${d?.current_weather?.temperature ?? "?"}°C`;
  })
  .catch(()=> el.innerText="Weather error");
}

/* NOTIFICATIONS */
async function enableNotifications(){
  await Notification.requestPermission();
}

/* 🔊 MP3 ALARM */
const alarmSound = new Audio("./alarm.mp3");
alarmSound.loop = true;

let audioUnlocked = false;

document.addEventListener("click", ()=>{
  if(audioUnlocked) return;
  alarmSound.play().then(()=>{
    alarmSound.pause();
    audioUnlocked = true;
  }).catch(()=>{});
}, { once:true });

function startAlarmSound(){
  if(!audioUnlocked) return;
  alarmSound.currentTime = 0;
  alarmSound.play().catch(()=>{});
}

/* ALARM */
function triggerAlarm(ev){

  document.getElementById("alarmBox").style.display = "flex";
  document.getElementById("alarmText").innerText = ev.name;

  startAlarmSound();

  if(Notification.permission === "granted"){
    new Notification("⏰ Event", { body: ev.name });
  }

  if(navigator.vibrate){
    navigator.vibrate([300,150,300,150,600]);
  }
}

function stopAlarm(){
  document.getElementById("alarmBox").style.display = "none";
  alarmSound.pause();
}

/* ADD EVENT */
function addEvent(){

  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const alarm = parseInt(document.getElementById("alarm").value);

  const t = new Date(`${date}T${time}`).getTime();

  if(editId){
    const ev = events.find(e=>e.id===editId);
    ev.name=name;
    ev.time=t;
    ev.alarm=alarm;
    ev.notified=false;
    editId=null;
  } else {
    events.push({
      id:Date.now(),
      name,
      time:t,
      alarm,
      notified:false
    });
  }

  save();
  render();
}

/* SMART LIST (WSZYSTKIE PRZYSZŁE EVENTY) */
function updateSmartList(){

  const now = Date.now();

  const upcoming = events
    .filter(e => e.time > now)
    .sort((a,b)=>a.time-b.time);

  const el = document.getElementById("nextEvents");

  if(upcoming.length === 0){
    el.innerHTML = "<div class='timer-item'>No upcoming events</div>";
    return;
  }

  el.innerHTML = "";

  upcoming.forEach(ev=>{

    const diff = ev.time - now;

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);
    const seconds = Math.floor((diff/1000)%60);

    el.innerHTML += `
      <div class="timer-item">
        <b>${ev.name}</b><br>
        <div style="opacity:0.8;font-size:13px">
          ${new Date(ev.time).toLocaleString()}
        </div>
        <div style="margin-top:4px;font-weight:600">
          ⏱ ${days > 0 ? days+"d " : ""}${hours}h ${minutes}m ${seconds}s
        </div>
      </div>
    `;
  });
}

/* LOOP */
setInterval(()=>{

  const now = Date.now();

  events.forEach(ev=>{
    const diff = ev.time - now;

    if(!ev.notified && diff <= ev.alarm*60000 && diff > 0){
      triggerAlarm(ev);
      ev.notified = true;
      save();
    }
  });

  events = events.filter(e=>e.time > now - 60000);
  save();

  render();
  updateSmartList();

},1000);

/* RENDER */
function render(){

  const e = document.getElementById("events");
  e.innerHTML="";

  events.sort((a,b)=>a.time-b.time);

  events.forEach(ev=>{
    e.innerHTML += `
      <div class="timer-item">
        <b>${ev.name}</b><br>
        ${new Date(ev.time).toLocaleString()}
      </div>
    `;
  });
}

/* SAVE */
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

/* INIT */
render();
weather();
updateSmartList();

</script>

</body>
</html>
