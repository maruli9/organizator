<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Countdown + Planner</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Event">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#0f0f0f">

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 12px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button { cursor: pointer; }

.todo-item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>📅 Event Planner</h1>

<button onclick="enableNotifications()">Enable Notifications</button>

<div class="card">
<h2>Event</h2>

<input id="eventName" placeholder="Event name"/>
<input id="eventDate" type="date"/>
<input id="eventTime" type="time"/>

<button onclick="saveEvent()">Save Event</button>

<h3 id="displayName"></h3>
<p id="countdown"></p>
</div>

<div class="card">
<h2>Todo</h2>
<input id="todoInput" placeholder="Task"/>
<button onclick="addTodo()">Add</button>
<div id="todoList"></div>
</div>

<div class="card">
<h2>Weather</h2>
<p id="weather">Loading...</p>
</div>

</div>

<script>

////////////////////////////////////////////////////
// NOTIFICATIONS
////////////////////////////////////////////////////
function enableNotifications(){
  if(!("Notification" in window)) return;

  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      new Notification("Notifications enabled 🔔");
      localStorage.setItem("notif","true");
    }
  });
}

////////////////////////////////////////////////////
// EVENT SYSTEM (STABLE)
////////////////////////////////////////////////////
function getEvent(){
  return JSON.parse(localStorage.getItem("event"));
}

function saveEvent(){
  const event = {
    name: document.getElementById("eventName").value,
    date: document.getElementById("eventDate").value,
    time: document.getElementById("eventTime").value || "00:00"
  };

  localStorage.setItem("event", JSON.stringify(event));
  renderEvent();
}

function renderEvent(){
  const event = getEvent();

  if(!event){
    document.getElementById("countdown").innerText = "No event";
    return;
  }

  document.getElementById("eventName").value = event.name || "";
  document.getElementById("eventDate").value = event.date || "";
  document.getElementById("eventTime").value = event.time || "";

  document.getElementById("displayName").innerText = event.name;

  const eventTime = new Date(`${event.date}T${event.time}`);
  const now = new Date();

  const diff = eventTime - now;

  if(diff <= 0){
    document.getElementById("countdown").innerText = "🔥 NOW";
    return;
  }

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000)/3600000);
  const minutes = Math.floor((diff % 3600000)/60000);

  document.getElementById("countdown").innerText =
    `${days}d ${hours}h ${minutes}m`;
}

////////////////////////////////////////////////////
// TODO
////////////////////////////////////////////////////
let todos = JSON.parse(localStorage.getItem("todos") || "[]");

function renderTodos(){
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  todos.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "todo-item";

    div.innerHTML = `
      <span>${t}</span>
      <button onclick="removeTodo(${i})">X</button>
    `;

    list.appendChild(div);
  });

  localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo(){
  const input = document.getElementById("todoInput");
  if(input.value){
    todos.push(input.value);
    input.value = "";
    renderTodos();
  }
}

function removeTodo(i){
  todos.splice(i,1);
  renderTodos();
}

////////////////////////////////////////////////////
// WEATHER (STABLE)
////////////////////////////////////////////////////
function loadWeather(){
  const fallbackLat = 48.2082;
  const fallbackLon = 16.3738;

  if(!navigator.geolocation){
    fetchWeather(fallbackLat, fallbackLon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos)=>fetchWeather(pos.coords.latitude, pos.coords.longitude),
    ()=>fetchWeather(fallbackLat, fallbackLon),
    {timeout:4000}
  );
}

async function fetchWeather(lat, lon){
  try{
    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );

    const data = await res.json();

    document.getElementById("weather").innerText =
      `Now: ${data.current_weather.temperature}°C`;

  } catch(e){
    document.getElementById("weather").innerText = "Weather error";
  }
}

////////////////////////////////////////////////////
// ALARMS (SAFE)
////////////////////////////////////////////////////
let lastAlarm = "";

function checkAlarms(){
  if(localStorage.getItem("notif") !== "true") return;

  const event = getEvent();
  if(!event) return;

  const eventTime = new Date(`${event.date}T${event.time}`);
  const now = new Date();

  const diff = eventTime - now;

  const key = Math.floor(diff / 60000);
  if(key === lastAlarm) return;
  lastAlarm = key;

  const day = 86400000;
  const hour = 3600000;
  const min15 = 900000;

  if(diff > day - 60000 && diff < day + 60000){
    new Notification("📅 Tomorrow: " + event.name);
  }

  if(diff > hour - 60000 && diff < hour + 60000){
    new Notification("⏰ 1 hour: " + event.name);
  }

  if(diff > min15 - 60000 && diff < min15 + 60000){
    new Notification("🔥 15 min: " + event.name);
  }
}

////////////////////////////////////////////////////
// START APP
////////////////////////////////////////////////////
window.addEventListener("load", ()=>{
  renderEvent();
  renderTodos();
  loadWeather();

  setInterval(renderEvent, 1000);
  setInterval(checkAlarms, 30000);
});

</script>

</body>
</html>
